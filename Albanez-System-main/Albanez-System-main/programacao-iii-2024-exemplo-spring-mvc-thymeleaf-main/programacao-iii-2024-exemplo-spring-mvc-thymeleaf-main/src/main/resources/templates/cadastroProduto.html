<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Produto</title>
</head>
<body>
<h1>Cadastro de Produto</h1>

<form action="#" th:action="@{/produtos}" th:object="${produto}" method="post">
    <label for="descricao">Descrição:</label>
    <input type="text" id="descricao" th:field="*{descricao}" required/><br>

    <label for="precoCusto">Preço De Custo:</label>
    <input type="number" id="precoCusto" th:field="*{precoCusto}" required/><br>

    <label for="precoVenda">Preço De Venda:</label>
    <input type="number" min="0.01" max="999999.00" step="0.01" id="precoVenda" th:field="*{precoVenda}" required/><br>

    <button type="submit">Cadastrar</button>
</form>

<a href="/">Voltar para a Página Inicial</a>
</body>
</html>
